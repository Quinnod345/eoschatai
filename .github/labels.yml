# PR Size labels - used by pr-size workflow
- name: "size/XS"
  color: "3CBF00"
  description: "Extra small PR (< 10 lines)"

- name: "size/S"
  color: "5D9801"
  description: "Small PR (10-49 lines)"

- name: "size/M"
  color: "7F7203"
  description: "Medium PR (50-199 lines)"

- name: "size/L"
  color: "A14C05"
  description: "Large PR (200-499 lines)"

- name: "size/XL"
  color: "C32607"
  description: "Extra large PR (500+ lines)"

# Type labels
- name: "type/bug"
  color: "d73a4a"
  description: "Bug fix"

- name: "type/feature"
  color: "0E8A16"
  description: "New feature"

- name: "type/docs"
  color: "0075ca"
  description: "Documentation"

- name: "type/chore"
  color: "FEF2C0"
  description: "Maintenance"

- name: "type/refactor"
  color: "FBCA04"
  description: "Code refactoring"

# Status labels
- name: "status/blocked"
  color: "B60205"
  description: "Blocked by external factors"

- name: "status/needs-review"
  color: "FBCA04"
  description: "Ready for review"

- name: "status/approved"
  color: "0E8A16"
  description: "Approved and ready to merge"
