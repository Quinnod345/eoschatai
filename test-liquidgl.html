<!DOCTYPE html>
<html>
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="/public/scripts/liquidGL.js"></script>
    <style>
        body { padding: 50px; background: #f0f0f0; }
        .test-bubble {
            background: #007bff;
            color: white;
            padding: 20px;
            border-radius: 15px;
            width: 300px;
            margin: 20px;
        }
    </style>
</head>
<body>
    <h1>LiquidGL Test</h1>
    <div class="test-bubble">This is a test message bubble</div>
    <script>
        setTimeout(() => {
            if (window.liquidGL) {
                console.log('liquidGL found!');
                liquidGL({
                    target: '.test-bubble',
                    refraction: 0.1,
                    bevelDepth: 0.2,
                    on: {
                        init: () => console.log('Initialized!')
                    }
                });
            } else {
                console.log('liquidGL NOT found');
            }
        }, 1000);
    </script>
</body>
</html>
